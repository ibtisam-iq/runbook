name: runbook — Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent concurrent deploys — cancel in-progress if new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

# Minimal default permissions — elevated per-job only
permissions:
  contents: read

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install QA tools (only in CI)
        run: pip install -r requirements-dev.txt

      - name: Build MkDocs site
        run: mkdocs build # --strict

      - name: QA - HTML validation
        # html5validator misinterprets shell-command placeholder tokens like <none>,
        # <hash>, <name>, <namespace>, <pending> in MkDocs-rendered code blocks as
        # literal HTML tags. This produces two false-positive error families:
        #   1) "Unclosed element ..."         — when placeholders appear inside <code>/<pre>
        #   2) "Element ... not allowed as child" + cascading "End tag" / "were open elements"
        #      — when placeholders appear outside block-level elements
        # All other real HTML validation errors remain enforced.
        run: |
          html5validator --root site --blacklist robots.txt --ignore \
            "autocomplete" \
            "autocorrect" \
            "autocapitalize" \
            "No \"p\" element in scope" \
            "Unclosed element" \
            "not allowed as child" \
            "End tag" \
            "were open elements" \
            "tabindex"
      - name: QA — Check for broken links
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >
              ./site/**/*.html
              --no-progress
              --accept 200,429
              --exclude "linkedin\.com"
              --exclude "x\.com"
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: lychee-report
          path: lychee/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload site artifact for Pages
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ./site

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy (only runs after build succeeds)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    # Required permissions for official OIDC-based Pages deploy
    permissions:
      pages: write
      id-token: write

    # Ties deployment to the github-pages environment (shows URL in UI)
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5.0.0

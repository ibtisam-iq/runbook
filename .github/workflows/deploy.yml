# Method — peaceiris/actions-gh-pages + PR Previews (Production-Grade)
name: runbook — Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "scripts/**"       # repo utility scripts
      - "README.md"        # GitHub repo landing page only
      - ".gitignore"       # repo config
      - ".mdformat.toml"   # local markdown formatter config
      - "docs/_meta/**"    # documentation metadata
  pull_request:
    branches:
      - main
    paths-ignore:
      - "scripts/**"
      - "README.md"
      - ".gitignore"
      - ".mdformat.toml"
      - "docs/_meta/**"
  workflow_dispatch:

# Prevent concurrent deploys — cancel in-progress if new push arrives
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions — elevated per-job only
permissions:
  contents: read

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build + QA (runs on every push AND every PR)
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install QA tools
        run: pip install -r requirements-dev.txt

      - name: Build MkDocs site
        run: mkdocs build # --strict

      - name: QA — HTML validation
        run: |
          html5validator --root site --blacklist robots.txt --ignore \
            "autocomplete" \
            "autocorrect" \
            "autocapitalize" \
            "No \"p\" element in scope" \
            "Unclosed element" \
            "not allowed as child" \
            "End tag" \
            "were open elements" \
            "tabindex"

      - name: QA — Check for broken links
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >
              ./site/**/*.html
              --no-progress
              --accept 200,429
              --exclude "linkedin\.com"
              --exclude "x\.com"
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: lychee-report
          path: lychee/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload site artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: site
          path: ./site
          retention-days: 1

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — PR Preview (runs ONLY on pull_request)
  # Live URL: https://runbook.ibtisam-iq.com/previews/pr-<number>/
  # Auto-deleted when PR is merged or closed.
  # Also posts the preview URL as a comment on the PR automatically.
  # ────────────────────────────────────────────────────────────────
  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    permissions:
      contents: write       # push preview to gh-pages branch
      pull-requests: write  # post preview URL comment on the PR

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download built site
        uses: actions/download-artifact@v8.0.1
        with:
          name: site
          path: ./site

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: ./site
          umbrella-dir: previews
          action: auto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Production Deploy (runs ONLY on push to main)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    permissions:
      contents: write   # push to gh-pages branch

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download built site
        uses: actions/download-artifact@v8.0.1
        with:
          name: site
          path: ./site

      - name: Write CNAME
        run: echo "runbook.ibtisam-iq.com" > ./site/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true

# Basic site metadata
site_name: "Runbook"
site_description: "Operational runbooks for Kubernetes, bare-metal infrastructure, DevSecOps pipelines, and platform tooling — written after doing the actual work."
site_author: "Muhammad Ibtisam"
site_url: "https://runbook.ibtisam-iq.com"

# Repository integration
repo_url: "https://github.com/ibtisam-iq/runbook"
repo_name: "ibtisam-iq/runbook"
edit_uri: edit/main/

# Build & output
docs_dir: .
site_dir: site/
use_directory_urls: true      # Use pretty URLs (e.g., /page/ instead of /page.html), default: true
# strict: true                  # Treat warnings as errors
exclude_docs: |
  README.md
  .venv/*
  .stratchpad/*
  scripts/*
  .github/*
  requirements*.txt
  mkdocs.yml
  CNAME
  .gitignore
  .mdformat.toml

draft_docs: |
  incident-response/*
  
  docs/_meta/*
  docs/_drafts/*

# Live reload watch paths
watch:
  - mkdocs.yml

# Build validation
validation:
  omitted_files: warn
  absolute_links: relative_to_docs
  unrecognized_links: warn
  anchors: warn
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: relative_to_docs
    unrecognized_links: warn

# Theme
theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/icons/favicon.ico
  logo: assets/icons/favicon.svg
  font:
    text: Inter
    code: Roboto Mono
  language: en
  features:
    # Navigation
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    #- navigation.prune
    - navigation.top
    - navigation.footer
    # TOC
    - toc.follow
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Content
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view
    - navigation.expand
    - navigation.indexes
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: "Link to this section"
      toc_depth: 2
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      use_pygments: true
      line_spans: __span
      pygments_lang_class: true
      anchor_linenums: true
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.']
      check_paths: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.arithmatex:
      generic: true

# Plugins
plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - same-dir
  - autorefs
  - awesome-nav
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true
  - git-revision-date-localized:
      type: custom
      custom_format: "%B %d, %Y %I:%M:%S %p"
      enable_creation_date: false
      fallback_to_build_date: false
      timezone: Asia/Karachi
      locale: en
      exclude:
        - index.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ibtisam-iq/
      name: Connect on LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/ibtisam-iq
      name: Follow on GitHub
    - icon: fontawesome/solid/globe
      link: https://ibtisam-iq.com
      name: Personal Website
  generator: false

hooks:
  - hooks/same_dir_fix.py

copyright: >-
  Copyright &copy; 2026
  <a href="https://www.linkedin.com/in/ibtisam-iq/" target="_blank" rel="noopener">Muhammad Ibtisam</a>.
  All rights reserved.

extra_css:
  - docs/stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
